<div class="rounded-2xl bg-slate-900 ring-1 ring-rose-500/30 border-l-4 border-rose-500 shadow-xl shadow-black/30 p-6">
  <div class="flex items-start gap-4">
    <div class="h-10 w-10 rounded-xl bg-rose-500/10 ring-1 ring-rose-500/30 grid place-items-center shrink-0">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5 text-rose-400">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="13"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    </div>
    <div class="flex-1">
      <h2 class="text-base font-semibold text-rose-400">{{ message }}</h2>
      {% if detail %}
        <p class="mt-1 text-sm text-slate-300">{{ detail }}</p>
      {% endif %}
      <p class="mt-3 text-xs text-slate-500">
        The upload form above is still active — pick another recording and try again.
      </p>
    </div>
  </div>
</div>
